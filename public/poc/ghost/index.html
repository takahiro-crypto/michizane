<!doctype html>
<html lang="ja"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>道真 × ホーリー 空出張 検知 PoC</title>
<style>
:root{--ink:#1c2b4a;--mute:#61708c;--line:#d5dce8;--card:#fff;--panel:#f4f7fb;
--hi:#b03a6e;--hi-bg:#fdecf2;--mid:#c2610c;--mid-bg:#fff3e6;--good:#0e7c71;--mono:'Consolas','Courier New',monospace}
*{box-sizing:border-box;margin:0;padding:0}
body{background:#eef1f6;color:var(--ink);font-family:'Yu Gothic UI','Meiryo','Hiragino Sans',sans-serif;font-size:14px;line-height:1.6;padding:26px 18px 60px}
.wrap{max-width:1100px;margin:0 auto}
a.back{color:var(--mute);font-size:12px;text-decoration:none;display:inline-block;margin-bottom:12px}
.head{border-left:4px solid var(--hi);padding-left:14px;margin-bottom:14px}
.ey{font-family:var(--mono);font-size:11px;letter-spacing:.14em;color:var(--mute);text-transform:uppercase}
h1{font-size:22px;font-weight:800;margin-top:3px}.sub{font-size:12px;color:var(--mute);margin-top:3px}
.note{background:var(--mid-bg);border-left:4px solid var(--mid);border-radius:0 8px 8px 0;padding:9px 13px;margin:14px 0;font-size:12.5px;color:#7a4a10}
.cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:11px;margin:14px 0}
.card{background:var(--card);border:1px solid var(--line);border-radius:10px;padding:12px 14px}
.card b{font-size:24px;font-family:var(--mono);font-weight:800;display:block;line-height:1.1}.card b.hi{color:var(--hi)}.card span{font-size:10.5px;color:var(--mute)}
h2{font-size:15px;margin:22px 0 8px}
.ev{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:14px 16px;margin-bottom:11px}
.ev.hi{border-left:5px solid var(--hi)}.ev.mid{border-left:5px solid var(--mid)}
.top{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.score{font-family:var(--mono);font-weight:800;font-size:20px}.score.hi{color:var(--hi)}.score.mid{color:var(--mid)}
.rk{font-size:10px;font-weight:700;padding:2px 8px;border-radius:20px}.rk.hi{background:var(--hi-bg);color:var(--hi)}.rk.mid{background:var(--mid-bg);color:var(--mid)}
.ttl{font-weight:700;font-size:14.5px}.meta{font-size:12px;color:var(--mute);margin-top:2px}
.tri{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:10px}
.tri .c{border:1px solid var(--line);border-radius:8px;padding:8px 10px;font-size:12px}
.tri .h{font-size:10px;color:var(--mute);font-weight:700;text-transform:uppercase;letter-spacing:.05em}
.tri .v{margin-top:3px}.bad{color:var(--hi);font-weight:700}
.rec{font-size:12px;color:#7a4a10;background:var(--mid-bg);border-radius:6px;padding:6px 10px;margin-top:10px}
.foot{font-size:11px;color:var(--mute);margin-top:24px;border-top:1px solid var(--line);padding-top:12px;line-height:1.7}
</style></head><body><div class="wrap">
<a class="back" href="/status/">← 進捗ダッシュボードへ</a>
<div class="head">
  <div class="ey">道真 × ホーリー PoC · 空出張（ゴースト出張）</div>
  <h1>空出張 検知コンソール</h1>
  <div class="sub">出張/交通費の申請 × カレンダー × 活動ログ（メタ）を突合し「行った形跡がない出張」を検知</div>
</div>
<div class="note"><b>※ 匿名サンプルのPoC</b>。全数値は擬似。<b>メタのみ使用（本文は読まない）</b>。行為の実在性の検知であって内容監視ではない。<b>検知は"候補"、判断は人</b>（設計v2.1）。</div>

<div class="cards" id="cards"></div>
<h2>空出張 候補（申請 vs カレンダー vs 活動）</h2>
<div id="events"></div>
<div class="foot" id="foot"></div>
</div>
<script>
const yen=n=>'¥'+Number(n).toLocaleString('en-US');
// 出張/交通費 申請（trip_date=出張実施日）
const APPS=[
  {id:'TRP-101', who:'k_a', dept:'営業一部', amount:45000, trip_date:'2026-04-15', by:'k_mgr', receipt:true},
  {id:'TRP-102', who:'k_b', dept:'営業二部', amount:62000, trip_date:'2026-04-22', by:'k_mgr', receipt:false},
  {id:'TRP-103', who:'k_c', dept:'営業一部', amount:38000, trip_date:'2026-04-09', by:'k_mgr', receipt:true},
  {id:'TRP-104', who:'k_d', dept:'開発部',   amount:12000, trip_date:'2026-04-11', by:'k_n',   receipt:true},
  {id:'TRP-105', who:'k_e', dept:'営業二部', amount:51000, trip_date:'2026-04-24', by:'k_mgr', receipt:true},
  {id:'TRP-106', who:'k_a', dept:'営業一部', amount:8800,  trip_date:'2026-04-18', by:'k_mgr', receipt:true},
];
// カレンダー(メタ)：当日の予定種別。trip=出張予定 / wfh=在宅 / office=社内会議 / none=予定なし
const CAL={ 'k_a|2026-04-15':'wfh', 'k_a|2026-04-18':'trip', 'k_b|2026-04-22':'none',
  'k_c|2026-04-09':'trip', 'k_d|2026-04-11':'office', 'k_e|2026-04-24':'trip' };
// 活動ログ(メタ)：当日のオフィスPCログイン回数・チャット発言数・打刻
const ACT={ 'k_a|2026-04-15':{login:12,chat:34,punch:'出勤'}, 'k_a|2026-04-18':{login:0,chat:1,punch:'-'},
  'k_b|2026-04-22':{login:9,chat:41,punch:'出勤'}, 'k_c|2026-04-09':{login:0,chat:2,punch:'-'},
  'k_d|2026-04-11':{login:6,chat:12,punch:'出勤'}, 'k_e|2026-04-24':{login:1,chat:3,punch:'-'} };
const calLabel={trip:'出張予定',wfh:'在宅予定',office:'社内会議',none:'予定なし'};

function detect(a){
  const key=a.who+'|'+a.trip_date; const cal=CAL[key]||'none'; const act=ACT[key]||{login:0,chat:0,punch:'-'};
  const flags=[]; let s=0;
  const calBad = cal!=='trip';
  const actBad = act.login>0 || act.chat>=10 || act.punch==='出勤';
  if(calBad){ flags.push(['出張予定なし','カレンダー: '+calLabel[cal]]); s+=35; }
  if(actBad){ flags.push(['オフィス在席の証跡',`当日 PCログイン${act.login}回／チャット${act.chat}件${act.punch==='出勤'?'／出勤打刻':''}`]); s+=40; }
  if(!a.receipt){ flags.push(['領収書なし','出張なのに領収書添付なし']); s+=10; }
  const ghost = calBad && actBad; // 両方矛盾＝空出張の強い候補
  return {a, cal, act, flags, ghost, score: Math.min(100, s + (ghost?15:0))};
}
const res=APPS.map(detect);
const rank=s=> s>=70?'hi': s>=35?'mid':'low';
const flagged=res.filter(r=>r.flags.length && rank(r.score)!=='low').sort((x,y)=>y.score-x.score);
const ghosts=res.filter(r=>r.ghost);

document.getElementById('cards').innerHTML=
  `<div class="card"><b>${APPS.length}</b><span>出張/交通費 申請</span></div>`+
  `<div class="card"><b class="hi">${ghosts.length}</b><span>空出張 強候補（両矛盾）</span></div>`+
  `<div class="card"><b class="hi">${flagged.length}</b><span>要確認 事案</span></div>`+
  `<div class="card"><b>${yen(flagged.reduce((s,r)=>s+r.a.amount,0))}</b><span>要確認の金額計</span></div>`;

document.getElementById('events').innerHTML=flagged.map(r=>{
  const rk=rank(r.score), a=r.a;
  const actBad=r.act.login>0||r.act.chat>=10||r.act.punch==='出勤';
  return `<div class="ev ${rk}"><div class="top"><span class="score ${rk}">${r.score}</span><span class="rk ${rk}">${r.ghost?'空出張の疑い':'要確認'}</span><span class="ttl">出張申請 ${yen(a.amount)}</span></div>
    <div class="meta">${a.id} ／ ${a.who}（${a.dept}）／ 出張日 ${a.trip_date} ／ 承認 ${a.by}</div>
    <div class="tri">
      <div class="c"><div class="h">申請（ホーリー）</div><div class="v">出張として ${yen(a.amount)} を申請</div></div>
      <div class="c"><div class="h">カレンダー（メタ）</div><div class="v ${r.cal!=='trip'?'bad':''}">${calLabel[r.cal]}${r.cal!=='trip'?'（出張予定なし）':''}</div></div>
      <div class="c"><div class="h">活動ログ（メタ）</div><div class="v ${actBad?'bad':''}">login ${r.act.login}／chat ${r.act.chat}／${r.act.punch}${actBad?'（在席）':''}</div></div>
    </div>
    <div class="rec">👤 <b>推奨</b>：${r.ghost?'監査が出張の実在性を確認（交通/宿泊の証憑・訪問先の裏取り）。本人に確認':'担当部門で確認'}。判断は人。メタのみ・本文は不使用。</div></div>`;
}).join('') || '<div class="ev"><span style="color:var(--mute)">空出張の候補は検知されませんでした。</span></div>';

document.getElementById('foot').innerHTML=
  '検知（決定論・メタのみ）：出張/交通費の申請日 × カレンダー（出張予定の有無）× 活動ログ（当日のPCログイン/チャット/打刻＝オフィス在席の証跡）を突合。'+
  '両方が「出張していない」を示す（カレンダー＝出張予定なし かつ 活動＝在席）と<b>空出張の強候補</b>。'+
  '<br>本文・チャット内容は一切読まない（行為の実在性の検知）。Phase＝ホーリー接続のカレンダー/活動メタを仮名化エクスポート（設計v2.1 供給層）。全数値サンプル。';
</script>
</body></html>
